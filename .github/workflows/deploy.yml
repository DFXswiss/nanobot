name: Deploy NanoBot

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "entrypoint.sh"
      - "workspace/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKER_IMAGE: dfxswiss/nanobot
  AZURE_RESOURCE_GROUP: rg-dfx-api-prd
  AZURE_CONTAINER_APP: ca-dfx-nbt-prd
  DEPLOY_INFO: ${{ github.ref_name }}-${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Azure Login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          creds: ${{ secrets.DFX_PRD_CREDENTIALS }}

      - name: Get current revision
        id: previous
        run: |
          REVISION=$(az containerapp revision list \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --query "[?properties.active].name" \
            --output tsv | head -1)
          echo "revision=$REVISION" >> "$GITHUB_OUTPUT"

      - name: Update Container App
        run: |
          az containerapp update \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --image ${{ env.DOCKER_IMAGE }}:${{ github.sha }} \
            --set-env-vars DEPLOY_INFO=${{ env.DEPLOY_INFO }}

      - name: Deactivate previous revision
        if: steps.previous.outputs.revision != ''
        run: |
          az containerapp revision deactivate \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --revision ${{ steps.previous.outputs.revision }}

      - name: Logout from Azure
        run: az logout
        if: always()
