name: nanobot

services:
  gateway:
    container_name: nanobot-gateway
    image: dfxswiss/nanobot:latest
    build: .
    restart: unless-stopped
    ports:
      - "18790:18790"
    volumes:
      - ~/.nanobot:/root/.nanobot
    env_file:
      - .env
    command: ["gateway"]
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G

  cli:
    image: dfxswiss/nanobot:latest
    build: .
    profiles: [cli]
    volumes:
      - ~/.nanobot:/root/.nanobot
    env_file:
      - .env
    entrypoint: ["nanobot"]
    command: ["status"]
    stdin_open: true
    tty: true
